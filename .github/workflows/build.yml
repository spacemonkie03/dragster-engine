name: Build Dragster Engine Mod

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate mod files
        shell: pwsh
        run: .\validate_mod.ps1

      - name: Build mod package
        shell: pwsh
        run: .\build_mod.ps1 -SkipInstallCopy

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dragster_engine-scs
          path: dist/dragster_engine.scs
          if-no-files-found: error
